version: '3.8'

services:
  # ===== DATABASES =====
  postgres:
    image: postgres:15-alpine
    container_name: schedule_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schedule_platform_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: schedule_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - schedule_platform_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # REDIS
  redis:
    image: redis:7-alpine
    container_name: schedule_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schedule_platform_network

# ===== API GATEWAY =====
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: api_gateway
    restart: always
    environment:
      APP_NAME: API Gateway
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      
      # Microservices URLs
      AUTH_SERVICE_URL: http://auth-service:8000
      PROFILE_SERVICE_URL: http://profile-service:8002
      SCHEDULE_SERVICE_URL: http://schedule-service:8001
      ADMIN_SERVICE_URL: http://admin-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - profile-service
      - schedule-service
      - admin-service
      - notification-service
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - schedule_platform_network

  # ===== MICROSERVICES =====
  
  # AUTH SERVICE
  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: auth_service
    restart: always
    volumes:
      - ./services/auth_service/migrations:/app/migrations
    environment:
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: auth_service_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/auth_service_db
      RABBITMQ_URL: ${RABBITMQ_URL}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      JWT_BLACKLIST_REDIS_URL: redis://redis:6379/15
      
      # App settings
      APP_NAME: Auth Service
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:8080","http://localhost:5173"]}
      ALLOW_CREDENTIALS: true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ✅ АВТОМАТИЧЕСКИЕ МИГРАЦИИ
    command: >
      sh -c "
        echo '🔄 Applying Auth Service migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations applied, starting Auth Service...' &&
        python run_server.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - schedule_platform_network

  # PROFILE SERVICE
  profile-service:
    build:
      context: .
      dockerfile: services/profile_service/Dockerfile
    container_name: profile_service
    restart: always
    environment:
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: profile_service_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/profile_service_db
      RABBITMQ_URL: ${RABBITMQ_URL}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/2
      JWT_BLACKLIST_REDIS_URL: redis://redis:6379/15
      
      # App settings
      APP_NAME: Profile Service
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOST: 0.0.0.0
      PORT: 8002
      
      # Base URL
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      API_PREFIX: /api/profile
      
      # Microservices integration
      AUTH_SERVICE_URL: http://auth-service:8000
      SCHEDULE_SERVICE_URL: http://schedule-service:8001
      AUTH_SERVICE_INTERNAL_KEY: ${INTERNAL_API_KEY}
      
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      
      # Avatars
      MAX_AVATAR_SIZE_MB: 5
      ALLOWED_AVATAR_TYPES: jpg,jpeg,png,gif,webp
      AVATAR_UPLOAD_PATH: static/avatars
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:8080","http://localhost:5173"]}
      ALLOW_CREDENTIALS: true
    ports:
      - "8002:8002"
    volumes:
      - avatar_uploads:/app/static/avatars
      - ./services/profile_service/migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # ✅ АВТОМАТИЧЕСКИЕ МИГРАЦИИ
    command: >
      sh -c "
        echo '🔄 Applying Profile Service migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations applied, starting Profile Service...' &&
        python run_server.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - schedule_platform_network

  # SCHEDULE SERVICE
  schedule-service:
    build:
      context: .
      dockerfile: services/schedule_service/Dockerfile
    container_name: schedule_service
    restart: always
    volumes:
      - ./services/schedule_service/migrations:/app/migrations
    environment:
      # Application Settings
      APP_NAME: Schedule Service
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOST: 0.0.0.0
      PORT: 8001
      
      # Schedule Service Database (своя БД)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: schedule_service_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/schedule_service_db

      # Redis (DB 4 для Schedule Service)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 4
      REDIS_URL: redis://redis:6379/4
      JWT_BLACKLIST_REDIS_URL: redis://redis:6379/15
      REDIS_CACHE_TTL: 3600
      
      # Security (ДОЛЖНЫ СОВПАДАТЬ с Auth Service!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      
      # CORS
      CORS_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      CORS_ALLOW_CREDENTIALS: true
      
      # Admin Service (для получения данных о студиях/кабинетах)
      ADMIN_SERVICE_URL: http://admin-service:8003
      ADMIN_SERVICE_TIMEOUT: 10
      
      # Schedule Settings
      SCHEDULE_GENERATION_WEEKS: 2
      DEFAULT_LESSON_DURATION_MINUTES: 60
      SCHEDULE_TIMEZONE: Asia/Tomsk
      WORKING_HOURS_START: "09:00"
      WORKING_HOURS_END: "20:00"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    command: >
      sh -c "
        echo '🔄 Applying Schedule Service migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations applied, starting Schedule Service...' &&
        python run_server.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - schedule_platform_network

  # ADMIN SERVICE
  admin-service:
    build:
      context: .
      dockerfile: services/admin_service/Dockerfile
    container_name: admin_service
    restart: always
    volumes:
      - ./services/admin_service/migrations:/app/migrations
    environment:
      # Database (Admin Service own DB)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: admin_service_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/admin_service_db
      RABBITMQ_URL: ${RABBITMQ_URL}
      
      # Redis (DB 3 для Admin Service)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3
      REDIS_URL: redis://redis:6379/3
      JWT_BLACKLIST_REDIS_URL: redis://redis:6379/15
      
      # App settings
      APP_NAME: Admin Service
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Security (ДОЛЖНЫ СОВПАДАТЬ с Auth Service!)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      
      # External Services URLs
      AUTH_SERVICE_URL: http://auth-service:8000
      PROFILE_SERVICE_URL: http://profile-service:8002
      SCHEDULE_SERVICE_URL: http://schedule-service:8001
      
      # Cache TTL
      CACHE_USER_TTL: 300
      CACHE_STUDIO_TTL: 600
      CACHE_CLASSROOM_TTL: 600
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:8080","http://localhost:5173"]}
      ALLOW_CREDENTIALS: true
      
      # Logging
      LOG_LEVEL: INFO
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # АВТОМАТИЧЕСКИЕ МИГРАЦИИ
    command: >
      sh -c "
        echo '🔄 Applying Admin Service migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations applied, starting Admin Service...' &&
        python run_server.py
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - schedule_platform_network
  
  # NOTIFICATION SERVICE
  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    container_name: notification_service
    restart: unless-stopped
    environment:
      APP_NAME: Notification Service
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOST: 0.0.0.0
      PORT: 8004
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      JWT_BLACKLIST_REDIS_URL: redis://redis:6379/15
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "true"
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - schedule_platform_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== MANAGEMENT TOOLS =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: schedule_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - schedule_platform_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: schedule_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-admin}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - schedule_platform_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  avatar_uploads:
    driver: local
  pgadmin_data:
    driver: local
  rabbitmq_data:
    driver: local
    

networks:
  schedule_platform_network:
    driver: bridge